<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Hijos - Hourglass</title>
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="css/hijos.css">
</head>

<body>
    <nav class="nav">
        <div class="nav_container">
            <figure class="nav_figure">
                <img src="./icons/logo.svg" class="nav_logo" alt="Hourglass Logo">
            </figure>

            <!-- Botón hamburguesa -->
            <button class="nav_toggle" id="menuToggle" aria-label="Abrir menú">
                <img src="./icons/menu-open.svg" alt="Abrir menú" class="menu-icon" id="menuIcon">
            </button>

            <ul class="nav_list" id="navList">
                <li class="nav_item">
                    <a href="dashboard.html" class="nav_link">Inicio</a>
                </li>
                <li class="nav_item">
                    <a href="reporte.html" class="nav_link">Reporte</a>
                </li>
                <li class="nav_item">
                    <a href="calendario.html" class="nav_link">Calendario</a>
                </li>
                <li class="nav_item">
                    <a href="hijos.html" class="nav_link active">Hijos</a>
                </li>
                <li class="nav_item">
                    <a href="#" id="logoutLink" class="nav_link" style="color: #f44336; font-weight: 600;">
                        🚪 Cerrar Sesión
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Contenido principal -->
    <main class="main-content">
        <div class="dashboard-container">
            <div class="dashboard-header">
                <h1>👨‍👩‍👧‍👦 Mis Hijos</h1>
                <button class="btn-primary" id="openChildForm">+ Registrar nuevo hijo</button>
            </div>

            <!-- Formulario para registrar hijo -->
            <div class="child-form-container" id="childFormContainer">
                <form class="child-form" id="childForm">
                    <h2>Registrar Nuevo Hijo</h2>
                    <p style="font-size: 0.9rem; color: #666; margin-bottom: 1.5rem;">
                        Cada hijo tendrá su propio email y contraseña para iniciar sesión
                    </p>

                    <!-- Campos de autenticación -->
                    <div class="form-group">
                        <label for="childName">Nombre completo *</label>
                        <input type="text" id="childName" placeholder="Ej: Carlos Pérez" required>
                    </div>

                    <div class="form-group">
                        <label for="childEmail">Email *</label>
                        <input type="email" id="childEmail" placeholder="Ej: carlos@email.com" required>
                        <small style="font-size: 0.7rem; color: #666;">Este será su usuario para iniciar sesión</small>
                    </div>

                    <div class="form-group">
                        <label for="childPassword">Contraseña *</label>
                        <input type="password" id="childPassword" placeholder="Mínimo 6 caracteres" required minlength="6">
                        <small style="font-size: 0.7rem; color: #666;">Mínimo 6 caracteres</small>
                    </div>

                    <!-- Datos personales -->
                    <div class="form-group">
                        <label for="childAge">Edad *</label>
                        <input type="number" id="childAge" placeholder="Ej: 10" min="1" max="18" required>
                    </div>

                    <div class="form-group">
                        <label for="childSchool">Colegio/Institución</label>
                        <input type="text" id="childSchool" placeholder="Ej: Colegio San José">
                    </div>

                    <div class="form-group">
                        <label for="childGrade">Grado/Nivel</label>
                        <select id="childGrade">
                            <option value="">Selecciona un grado</option>
                            <option value="Preescolar">Preescolar</option>
                            <option value="1° Primaria">1° Año de Educación Básica</option>
                            <option value="2° Primaria">2° Año de Educación Básica</option>
                            <option value="3° Primaria">3° Año de Educación Básica</option>
                            <option value="4° Primaria">4° Año de Educación Básica</option>
                            <option value="5° Primaria">5° Año de Educación Básica</option>
                            <option value="6° Primaria">6° Año de Educación Básica</option>
                            <option value="6° Primaria">7° Año de Educación Básica</option>
                            <option value="1° Secundaria">8° Año de Educación Básica</option>
                            <option value="2° Secundaria">9° Año de Educación Básica</option>
                            <option value="3° Secundaria">10° Año de Educación Básica</option>
                            <option value="4° Secundaria">1° de Bachillerato</option>
                            <option value="5° Secundaria">2° de Bachillerato</option>
                            <option value="5° Secundaria">3° de Bachillerato</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="childAvatar">Avatar</label>
                        <select id="childAvatar">
                            <option value="👦">👦 Niño</option>
                            <option value="👧">👧 Niña</option>
                            <option value="🧒">🧒 Niño</option>
                            <option value="🧑">🧑 Niño</option>
                            <option value="👶">👶 Bebé</option>
                            <option value="🧸">🧸 Osito</option>
                            <option value="🐱">🐱 Gato</option>
                            <option value="🐶">🐶 Perro</option>
                            <option value="🦊">🦊 Zorro</option>
                            <option value="🐼">🐼 Panda</option>
                        </select>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn-secondary" id="cancelChildForm">Cancelar</button>
                        <button type="submit" class="btn-primary">Registrar hijo</button>
                    </div>
                </form>
            </div>

            <!-- Lista de hijos registrados -->
            <div class="children-section">
                <div class="children-header">
                    <h2>Hijos Registrados</h2>
                    <span id="childCounter" style="font-size: 0.9rem; color: #666;"></span>
                </div>
                <div id="childrenContainer">
                    <!-- Aquí se mostrarán los hijos -->
                </div>
            </div>
        </div>
    </main>

    <!-- Mensaje de notificación -->
    <div class="notification" id="notification">
        ✅ Hijo registrado correctamente
    </div>

    <script src="js/hijos.js"></script>
</body>

</html>
