<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hourglass</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <div class="form-container">
            <div class="form-top">
                <span>Hourglass</span>
            </div>
            <div class="form" id="form">
                <div class="login">
                    <h2>Bienvenido</h2>
                    <p>¡Bienvenido de vuelta! Por favor ingrese sus datos</p>
                    
                    <!-- Rol de usuario para login -->
                    <div class="input">
                        <label for="loginRole">Iniciar sesión como</label>
                        <select id="loginRole" required>
                            <option value="padre">👨‍👩‍👦 Padre/Madre</option>
                            <option value="hijo">👦 Hijo/Hija</option>
                        </select>
                    </div>
                    
                    <div class="input">
                        <label for="email">Email</label>
                        <input type="email" name="email" id="email" placeholder="ejemplo@direcciondecorreo.com" required>
                    </div>
                    <div class="input">
                        <label for="password">Contraseña</label>
                        <input type="password" name="password" id="password" placeholder="Ingrese su contraseña" required>
                    </div>
                    <div class="reminder">
                        <div class="checkbox-container">
                            <input type="checkbox" id="terms">
                            <label for="terms">Recordar por 30 días</label>
                        </div>
                        <span class="forgot">Olvidé mi contraseña</span>
                    </div>
                    <div class="buttons">
                        <button type="button" id="loginBtn">Iniciar sesión</button>
                    </div>
                    <p class="account">¿No tienes una cuenta? <a href="#" id="sign-up">Regístrate</a></p>
                </div>

                <form class="register">
                    <h2>Crea tu cuenta</h2>
                    <p>Usa tu correo electrónico para registrarte</p>
                    
                    <!-- Rol de usuario para registro -->
                    <div class="input">
                        <label for="registerRole">Tipo de usuario</label>
                        <select id="registerRole" required>
                            <option value="padre">👨‍👩‍👦 Soy Padre/Madre</option>
                            <option value="hijo">👦 Soy Hijo/Hija</option>
                        </select>
                    </div>
                    
                    <div class="input">
                        <label for="name">Nombre</label>
                        <input type="text" name="name" id="name" placeholder="Ingresa un nombre y un apellido">
                    </div>
                    <div class="input">
                        <label for="email-reg">Email</label>
                        <input type="email" name="email" id="email-reg" placeholder="ejemplo@direcciondecorreo.com">
                    </div>
                    <div class="input">
                        <label for="password-reg">Contraseña</label>
                        <input type="password" name="password" id="password-reg" placeholder="Ingrese su contraseña">
                    </div>
                    <div class="buttons">
                        <button type="button" id="registerBtn">Registrarse</button>
                    </div>
                    <p class="account">¿Ya tienes una cuenta? <a href="#" id="sign-in">Inicia sesión</a></p>
                </form>
            </div>
            <div class="form-bot">
                <span>© Hourglass 2026</span>
            </div>
        </div>
        <div class="banner" id="banner">
            <div class="circle"></div>
            <div class="circle-2"></div>
        </div>
        
        <script type="module" src="js/auth-ui.js"></script>
    </div>
</body>

</html>
